<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- BACKGROUND VIDEO -->
      <video
        src="assets/galaxy.mp4"
        class="bg-video"
        autoplay
        muted
        loop
        plays-inline
      ></video>

      <!-- DARK OVERLAY -->
      <div class="overlay"></div>

      <section>
        <div class="infos">
          <div class="info">
            <h3>High Score: <span id="high-score">0</span></h3>
          </div>

          <div class="info">
            <h3>Score: <span id="score">0</span></h3>
          </div>

          <div class="info">
            <h3>Time: <span id="time">00:00</span></h3>
          </div>
        </div>

        <div class="board"></div>

        <!-- 📱 MOBILE CONTROLS -->
        <div class="controls">
          <button class="ctrl up">⬆️</button>
          <div class="middle">
            <button class="ctrl left">⬅️</button>
            <button class="ctrl right">➡️</button>
          </div>
          <button class="ctrl down">⬇️</button>
        </div>
      </section>

      <div class="modal">
        <div class="start-game">
          <h3>Welcome to the Snake Game</h3>
          <button class="btn btn-start">Start Game</button>
        </div>

        <div class="game-over">
          <h3>Game Over</h3>
          <button class="btn btn-restart">Restart Game</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
